services:
  - type: web
    name: edunotify
    runtime: node
    plan: free

    # Install system Chrome dependencies, npm packages, and build React
    buildCommand: |
      npm install
      npx puppeteer browsers install chrome
      npm run build

    # Start the Express server (serves built React + API)
    startCommand: node server.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/puppeteer
      - key: BREVO_KEY
        sync: false            # Set this in Render Dashboard -> Environment
      - key: SENDER_EMAIL
        sync: false            # Set this in Render Dashboard -> Environment
      - key: FRONTEND_URL
        sync: false            # e.g. https://edunotify.onrender.com
